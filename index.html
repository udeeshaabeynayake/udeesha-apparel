<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Udeesha Apparel | Live Inventory</title>
    <style>
        :root {
            --bg: #f8f9fa; --card-bg: #ffffff; --text: #1a1a1a;
            --nav-bg: #1a1a1a; --nav-text: #ffffff; --accent: #ff4757;
            --border: #eeeeee; --disabled: #95a5a6;
        }
        body.dark-mode {
            --bg: #121212; --card-bg: #1e1e1e; --text: #e0e0e0;
            --nav-bg: #000000; --nav-text: #ffffff; --border: #333333;
        }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; transition: 0.2s; }
        body { margin: 0; background-color: var(--bg); color: var(--text); }
        nav { background: var(--nav-bg); color: var(--nav-text); padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2.5rem; }
        .card { background: var(--card-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid var(--border); position: relative; }
        .card.sold-out { opacity: 0.6; filter: grayscale(0.5); }
        .card img { width: 100%; height: 320px; object-fit: cover; }
        .status-badge { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: white; padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .card-content { padding: 1.5rem; text-align: center; }
        .btn { width: 100%; padding: 12px; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; margin-top: 10px; }
        .btn-accent { background: var(--accent); color: white; }
        .btn-sold { background: var(--disabled); color: white; cursor: not-allowed; }
        #debug-log { background: #000; color: #0f0; padding: 10px; font-family: monospace; font-size: 0.8rem; margin-top: 50px; border-radius: 5px; display: none; }
        
        /* Sidebar & Modal */
        #cart-sidebar { position: fixed; right: -400px; top: 0; width: 350px; height: 100%; background: var(--card-bg); box-shadow: -10px 0 30px rgba(0,0,0,0.2); transition: 0.4s; padding: 2rem; z-index: 2000; }
        #cart-sidebar.active { right: 0; }
        #checkout-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; justify-content: center; align-items: center; }
        .modal-content { background: var(--card-bg); padding: 2rem; border-radius: 10px; width: 90%; max-width: 450px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: 5px; }
    </style>
</head>
<body>

    <nav>
        <div style="font-size: 1.5rem; font-weight: 900;">UDEESHA.</div>
        <div>
            <button onclick="toggleTheme()" style="background:none; border:1px solid; color:inherit; padding:5px 10px; border-radius:20px; cursor:pointer; margin-right:10px;">🌓 Theme</button>
            <button class="btn-accent" style="width:auto; padding:8px 15px" onclick="toggleCart()">Cart (<span id="cart-count">0</span>)</button>
        </div>
    </nav>

    <div class="container">
        <h2 id="status-head">Checking Warehouse...</h2>
        <div id="product-grid" class="grid"></div>
        <div id="debug-log"></div>
    </div>

    <div id="cart-sidebar">
        <h2 onclick="toggleCart()" style="cursor:pointer">&times; Close</h2>
        <div id="cart-items" style="margin: 20px 0;"></div>
        <hr>
        <h3>Total: $<span id="total-price">0</span></h3>
        <button class="btn btn-accent" onclick="openCheckout()">Place Order</button>
    </div>

    <div id="checkout-modal">
        <div class="modal-content">
            <h2>Order Details</h2>
            <form action="https://formspree.io/f/xgonjlpr" method="POST">
                <input type="text" name="name" placeholder="Full Name" required>
                <input type="email" name="email" placeholder="Email" required>
                <textarea name="address" placeholder="Shipping Address" rows="3" required></textarea>
                <input type="hidden" name="order_items" id="hidden-summary">
                <button type="submit" class="btn btn-accent">Confirm Order</button>
                <button type="button" onclick="closeModal()" style="background:none; border:none; width:100%; margin-top:10px; cursor:pointer; color:var(--text)">Cancel</button>
            </form>
        </div>
    </div>

    <script>
        // NEW SHEET LINK APPLIED
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQEyxhe40YVMMDXqT1rGBE2N-4k5jkmJqoeNnlT5vUASmpd9LZp12PRMu2fsHpudho5qpUg7UyuAoD2/pub?output=csv';
        
        let products = [];
        let cart = JSON.parse(localStorage.getItem('udeesha_cart')) || [];

        function logDebug(msg) {
            const log = document.getElementById('debug-log');
            log.style.display = 'block';
            log.innerHTML += `> ${msg}<br>`;
        }

        async function initStore() {
            try {
                logDebug("Attempting to fetch CSV...");
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const csvText = await response.text();
                logDebug("CSV Data received. Parsing...");

                const rows = csvText.split(/\r?\n/).slice(1); 
                products = rows.map((row, index) => {
                    // This Regex handles commas inside quotes correctly
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(cols.length < 3) return null;
                    return {
                        id: index,
                        name: cols[0].replace(/"/g, '').trim(),
                        price: parseFloat(cols[1].replace(/[^0-9.]/g, '')),
                        img: cols[2].replace(/"/g, '').trim(),
                        status: cols[3] ? cols[3].replace(/"/g, '').trim() : "In Stock"
                    };
                }).filter(p => p && p.name);

                logDebug(`Found ${products.length} products.`);
                document.getElementById('status-head').innerText = "Our Collection";
                renderProducts();
                updateUI();
            } catch (err) {
                logDebug(`ERROR: ${err.message}`);
                document.getElementById('status-head').innerText = "Connection Error";
            }
        }

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => {
                const isSoldOut = p.status.toLowerCase() === 'sold out';
                return `
                    <div class="card ${isSoldOut ? 'sold-out' : ''}">
                        ${isSoldOut ? '<div class="status-badge">OUT OF STOCK</div>' : ''}
                        <img src="${p.img}" onerror="this.src='https://via.placeholder.com/300?text=Image+Not+Found'">
                        <div class="card-content">
                            <h3 style="margin:0">${p.name}</h3>
                            <p style="color:var(--accent); font-weight:800; font-size:1.2rem">$${p.price.toFixed(2)}</p>
                            <button 
                                class="btn ${isSoldOut ? 'btn-sold' : 'btn-accent'}" 
                                onclick="${isSoldOut ? '' : `addToCart(${p.id})`}"
                                ${isSoldOut ? 'disabled' : ''}>
                                ${isSoldOut ? 'Unavailable' : 'Add to Cart'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function addToCart(id) {
            cart.push(products.find(p => p.id === id));
            saveCart();
        }

        function saveCart() { localStorage.setItem('udeesha_cart', JSON.stringify(cart)); updateUI(); }

        function updateUI() {
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-items').innerHTML = cart.map(i => `<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>${i.name}</span><span>$${i.price.toFixed(2)}</span></div>`).join('') || "Your bag is empty.";
            document.getElementById('total-price').innerText = cart.reduce((s, i) => s + i.price, 0).toFixed(2);
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }
        function toggleTheme() { document.body.classList.toggle('dark-mode'); }
        function openCheckout() {
            if(cart.length === 0) return alert("Bag is empty!");
            document.getElementById('hidden-summary').value = cart.map(i => i.name).join(', ');
            document.getElementById('checkout-modal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('checkout-modal').style.display = 'none'; }

        initStore();
    </script>
</body>
</html>
