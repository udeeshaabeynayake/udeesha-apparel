<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UDEESHA | Premium Secure Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fdfdfd; --card-bg: #ffffff; --text: #0a0a0a; --accent: #000000; --border: rgba(0,0,0,0.08); }
        body.dark-mode { --bg: #0a0a0a; --card-bg: #161616; --text: #f5f5f5; --accent: #ffffff; --border: rgba(255,255,255,0.1); }
        
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; }
        body { margin: 0; background-color: var(--bg); color: var(--text); min-height: 100vh; }

        /* Auth Screen */
        .auth-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: flex; justify-content: center; align-items: center; }
        .auth-card { background: var(--card-bg); padding: 3rem; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border); }
        
        .btn { padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; width: 100%; margin-top: 10px; }
        .btn-black { background: var(--accent); color: var(--bg); }
        .google-btn { background: #fff; border: 1px solid #ddd; color: #555; display: flex; align-items: center; justify-content: center; gap: 10px; }

        /* Nav & Content */
        nav { background: var(--bg); padding: 1rem 8%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .nav-right { display: flex; gap: 15px; align-items: center; }
        .user-pic { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 1px solid var(--border); }
        
        .container { max-width: 1200px; margin: 3rem auto; padding: 0 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; }
        .card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
        .card img { width: 100%; height: 350px; object-fit: cover; }
        .card-body { padding: 1.5rem; text-align: center; }

        .hidden { display: none !important; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg); color: var(--text); }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-overlay">
        <div class="auth-card">
            <h1 style="font-weight:800; margin-bottom: 0.5rem;">UDEESHA.</h1>
            <p style="opacity:0.6; margin-bottom: 2rem;">Sign in to start shopping</p>
            
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            
            <button class="btn btn-black" id="loginBtn">Sign In</button>
            <button class="btn" style="background:none; font-size:0.8rem;" id="signupBtn">New? Create Account</button>
            
            <div style="margin: 20px 0; opacity:0.2;">OR</div>
            
            <button class="btn google-btn" id="googleBtn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18">
                Continue with Google
            </button>
        </div>
    </div>

    <nav class="hidden" id="main-nav">
        <div style="font-weight:900; font-size:1.5rem;">UDEESHA.</div>
        <div class="nav-right">
            <span id="user-name" style="font-weight:600; font-size:0.9rem;"></span>
            <img id="user-img" class="user-pic" src="">
            <button class="btn btn-black" style="padding:8px 15px; width:auto; font-size:0.8rem;" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <div class="container hidden" id="store-content">
        <h2 style="font-weight:800; margin-bottom: 2rem;">New Drops</h2>
        <div class="grid" id="product-grid"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBZqBJmhdOFaKt5E1ToEFfOvesmtu4nIl0",
            authDomain: "udeesha-store.firebaseapp.com",
            projectId: "udeesha-store",
            storageBucket: "udeesha-store.firebasestorage.app",
            messagingSenderId: "262944265513",
            appId: "1:262944265513:web:33a81b1d710b13e1905338",
            measurementId: "G-G6W1XWLPSG"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // UI Selectors
        const authScreen = document.getElementById('auth-screen');
        const mainNav = document.getElementById('main-nav');
        const content = document.getElementById('store-content');

        // Authentication Handlers
        document.getElementById('googleBtn').onclick = () => signInWithPopup(auth, new GoogleAuthProvider());
        
        document.getElementById('signupBtn').onclick = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            createUserWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
        };

        document.getElementById('loginBtn').onclick = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            signInWithEmailAndPassword(auth, email, pass).catch(e => alert(e.message));
        };

        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        // Monitor Auth State
        onAuthStateChanged(auth, (user) => {
            if (user) {
                authScreen.classList.add('hidden');
                mainNav.classList.remove('hidden');
                content.classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName || user.email.split('@')[0];
                document.getElementById('user-img').src = user.photoURL || 'https://via.placeholder.com/100';
                fetchProducts();
            } else {
                authScreen.classList.remove('hidden');
                mainNav.classList.add('hidden');
                content.classList.add('hidden');
            }
        });

        // Store Logic
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQEyxhe40YVMMDXqT1rGBE2N-4k5jkmJqoeNnlT5vUASmpd9LZp12PRMu2fsHpudho5qpUg7UyuAoD2/pub?output=csv';

        async function fetchProducts() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split(/\r?\n/).slice(1);
                const grid = document.getElementById('product-grid');
                
                grid.innerHTML = rows.map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(cols.length < 3) return '';
                    return `
                        <div class="card">
                            <img src="${cols[2].trim()}">
                            <div class="card-body">
                                <h3 style="margin:0">${cols[0].trim()}</h3>
                                <p style="font-weight:800; color:#d63031; font-size:1.2rem;">$${cols[1].trim()}</p>
                                <button class="btn btn-black" onclick="alert('Order link sent to dashboard!')">Add to Bag</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) { console.error("Grid failed to load", err); }
        }
    </script>
</body>
</html>
